<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="StudyMap — crowdsourced study resource map">
  <defs>

    <pattern id="ambgrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#F59E0B" stroke-opacity="0.04" stroke-width="1"></path>
    </pattern>
    <clipPath id="lp-og"><path d="M600,145 Q550,139 500,145 L500,295 L600,295 Z"></path></clipPath>
    <clipPath id="rp-og"><path d="M600,145 Q650,139 700,145 L700,295 L600,295 Z"></path></clipPath>

  </defs>


  <rect width="1200" height="630" fill="#0A0A0A"></rect>

  <rect width="1200" height="630" fill="url(#ambgrid)"></rect>



  <path d="M600,145 Q550,139 500,145 L500,295 L600,295 Z" fill="#FFFFFF"></path>

  <path d="M600,145 Q650,139 700,145 L700,295 L600,295 Z" fill="#FFFFFF"></path>


  <g clip-path="url(#lp-og)" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="525" y1="145" x2="525" y2="295"></line>
    <line x1="550" y1="145" x2="550" y2="295"></line>
    <line x1="575" y1="145" x2="575" y2="295"></line>
    <line x1="500" y1="175" x2="600" y2="175"></line>
    <line x1="500" y1="205" x2="600" y2="205"></line>
    <line x1="500" y1="235" x2="600" y2="235"></line>
    <line x1="500" y1="265" x2="600" y2="265"></line>
  </g>


  <g clip-path="url(#rp-og)" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="600" y1="170" x2="700" y2="170"></line>
    <line x1="600" y1="195" x2="700" y2="195"></line>
    <line x1="600" y1="220" x2="700" y2="220"></line>
    <line x1="600" y1="245" x2="700" y2="245"></line>
    <line x1="600" y1="270" x2="700" y2="270"></line>
  </g>


  <line x1="600" y1="145" x2="600" y2="295" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></line>


  <circle cx="550" cy="205" r="9" fill="#F59E0B"></circle>


  <text font-family="'Space Grotesk', ui-sans-serif, sans-serif" font-weight="700" font-size="64" letter-spacing="-2" text-anchor="middle" x="600" y="368">
    <tspan fill="#FFFFFF">Study</tspan><tspan fill="#F59E0B">Map</tspan>
  </text>


  <line x1="490" y1="386" x2="710" y2="386" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"></line>


  <text font-family="'Inter', ui-sans-serif, sans-serif" font-weight="400" font-size="20" text-anchor="middle" x="600" y="416" fill="#6B7280">Find study spots and resources near you.</text>


  <text font-family="'Inter', ui-sans-serif, sans-serif" font-size="13" font-weight="400" letter-spacing="0.04em" text-anchor="middle" x="600" y="590" fill="#3F3F46">studyymap.com</text>
</svg>
