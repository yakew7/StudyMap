name: Bug report
description: Something is broken or not working as expected.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Found a bug? Thanks for reporting it. Fill in as much detail as you can so we can reproduce it quickly.
        For security vulnerabilities, do **not** file a public issue — see SECURITY.md.
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Chrome 125 on macOS 14"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or console logs (optional)
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those go to studentsuite0@gmail.com).
          required: true
